name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11 (requerido pelo PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project dependencies (Glue + dev)
        run: python -m pip install -e ".[dev]"

      - name: Install dbt
        run: python -m pip install dbt-core==1.11.7 dbt-athena-community "mypy-boto3-athena>=1.35.0"

      - name: Create dbt profiles.yml (CI — sem credenciais reais)
        run: |
          cat > dbt/bcb_warehouse/profiles.yml <<'EOF'
          bcb_warehouse:
            target: dev
            outputs:
              dev:
                type: athena
                region_name: us-east-1
                database: awsdatacatalog
                schema: bcb_warehouse
                s3_staging_dir: s3://bcb-warehouse/athena-results/
                threads: 1
          EOF

      - name: Install dbt packages
        run: dbt deps --project-dir dbt/bcb_warehouse --profiles-dir dbt/bcb_warehouse

      - name: Lint (ruff)
        run: python -m ruff check glue/ dags/ tools/ tests/

      - name: Type check (mypy)
        run: python -m mypy glue/ dags/ tools/

      - name: Unit tests — Glue Job (pytest)
        run: python -m pytest tests/unit/glue/ -v --cov=glue --cov-report=term-missing --cov-fail-under=80

      - name: Validate dbt syntax (dbt parse)
        run: dbt parse --project-dir dbt/bcb_warehouse --profiles-dir dbt/bcb_warehouse
